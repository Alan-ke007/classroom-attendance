version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: attendance-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-classroom_attendance}
      MYSQL_USER: ${MYSQL_USER:-attendance}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-attendance123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/database/init_database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot后端
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: attendance-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/classroom_attendance?useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-attendance}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-attendance123}
      ALGORITHM_SERVICE_URL: http://algorithm:5000
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      algorithm:
        condition: service_healthy
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Flask算法服务
  algorithm:
    build:
      context: ./algorithm-service
      dockerfile: ../docker/algorithm/Dockerfile
    container_name: attendance-algorithm
    restart: unless-stopped
    volumes:
      - algorithm-models:/app/models
    ports:
      - "5000:5000"
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Vue3前端
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: attendance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql-data:
    driver: local
  algorithm-models:
    driver: local

networks:
  attendance-network:
    driver: bridge
